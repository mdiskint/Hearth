<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <h1>🔥 Hearth</h1>
    <p class="status" id="status">Active</p>

    <div class="heat-preview" id="heat-preview">
      <!-- Heat map preview renders here -->
    </div>

    <div class="stats">
      <div class="stat">
        <span class="number" id="memory-count">0</span>
        <span class="label">Memories</span>
      </div>
      <div class="stat">
        <span class="number" id="session-count">0</span>
        <span class="label">This Session</span>
      </div>
    </div>

    <div class="actions">
      <button id="open-settings">Settings</button>
    </div>

    <div id="auth-section" class="auth-section"></div>
  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
